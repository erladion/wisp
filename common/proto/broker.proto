syntax = "proto3";
package broker;

option cc_enable_arenas = true;

// Routing envelope, carried as its own ZMQ frame ahead of an opaque payload
// frame. The broker parses only this header to route a message and never looks
// at the payload that follows, so any payload encoding (a packed protobuf Any,
// JSON, raw bytes) passes through untouched - see common/wireframe.h.
message MessageHeader {
  string handler_key = 1;
  string sender_id = 2;
  string topic = 3;
  string origin_broker_id = 4;
  // 16 raw UUID bytes (see generateBinaryUUID). `bytes` and `string` share a
  // wire type, so peers still speaking 36-char text uuids stay parseable -
  // the dedup treats both as opaque.
  bytes message_uuid = 5;
  string reply_topic = 6;
}

message ClientInfo {
    string id = 1;
    repeated string subscriptions = 2;
    // Messages the broker tried to deliver to this client but had to drop
    // (full pipe or unroutable), since the client connected. A growing value
    // means the client is not keeping up.
    uint64 dropped_messages = 3;
}

message SystemStats {
    string broker_id = 1;
    int32 clients_count = 2;
    int32 peers_count = 3;
    int32 msgs_per_sec = 4;
    double kb_per_sec = 5;
    int64 total_msgs = 6;
    int64 uptime_sec = 7;
    repeated ClientInfo connected_clients = 8;
    // Discovery cluster this broker currently meshes in; empty when discovery
    // is disabled. Changes at runtime via a SET_CLUSTER message.
    string cluster = 9;
    // Deliveries dropped across all clients since the broker started.
    uint64 total_dropped = 10;
    // SUBSCRIBEs refused since startup for exceeding the per-client topic
    // length or subscription count limits. A rejected subscription is
    // invisible to the client, so this is how it surfaces.
    uint64 total_rejected_subs = 11;
}
